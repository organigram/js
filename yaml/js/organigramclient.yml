    remarks: ''
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: |-
        constructor(input: {
                publicClient: PublicClient;
                address?: string;
                chainId?: string;
                procedureTypes?: ProcedureType[];
                contract?: any;
                walletClient?: WalletClient;
            });
      parameters:
