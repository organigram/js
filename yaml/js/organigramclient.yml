name: OrganigramClient
uid: '@organigram/js!OrganigramClient:class'
package: '@organigram/js!'
fullName: OrganigramClient
summary: >-
  Main SDK entry point used to deploy and hydrate Organigram protocol objects.


  It keeps a public client, an optional wallet client, the registered procedure types for the current chain, and small
  in-memory caches for loaded organs, procedures, and assets.
remarks: ''
example: []
isPreview: false
isDeprecated: false
type: class
