methods:
  - name: deployAsset(name, symbol, initialSupply, salt, options)
    uid: '@organigram/js!OrganigramClient#deployAsset:member(1)'
    package: '@organigram/js!'
    fullName: deployAsset(name, symbol, initialSupply, salt, options)
    summary: Deploy a single ERC-20 asset clone.
    remarks: ''
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: >-
        deployAsset(name: string, symbol: string, initialSupply: number, salt?: string, options?: TransactionOptions):
        Promise<string>;
      parameters:
        - id: name
          description: Token name exposed by the deployed contract.
          type: string
        - id: symbol
          description: Token symbol exposed by the deployed contract.
          type: string
        - id: initialSupply
          description: Human-readable token supply before conversion to wei.
          type: number
        - id: salt
          description: Optional deterministic clone salt.
          type: string
        - id: options
          description: Optional transaction controls.
          type: <xref uid="@organigram/js!TransactionOptions:interface" />
      return:
        type: Promise&lt;string&gt;
        description: The address of the deployed asset contract.
