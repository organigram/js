      return:
        type: Promise&lt;<xref uid="@organigram/js!OrganigramClient:class" />&gt;
        description: A ready-to-use SDK instance pointing at the newly deployed client.
  - name: deployOrgan(input)
    uid: '@organigram/js!OrganigramClient#deployOrgan:member(1)'
    package: '@organigram/js!'
    fullName: deployOrgan(input)
    summary: >-
      Deploy a single organ clone and hydrate the resulting SDK object.


      When no permissions are provided, the connected wallet is granted the full admin bitmask by default so the organ
